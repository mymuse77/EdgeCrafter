task: detection

evaluator:
  type: CocoEvaluator
  iou_types: ['bbox', ]
  verbose: False

num_classes: 777 # your dataset classes
remap_mscoco_category: False

train_dataloader:
  type: DataLoader
  dataset:
    type: CocoDetection
    img_folder: D:\AI\Datasets\20250731-ppe2286y\train\images
    ann_file: D:\AI\Datasets\20250731-ppe2286y\train\_annotations.coco.json
    return_masks: False
    transforms:
      type: Compose
      ops: ~
  shuffle: True
  num_workers: 4
  drop_last: True
  collate_fn:
    type: BatchImageCollateFunction


val_dataloader:
  type: DataLoader
  dataset:
    type: CocoDetection
    img_folder: D:\AI\Datasets\20250731-ppe2286y\valid\images
    ann_file: D:\AI\Datasets\20250731-ppe2286y\valid\_annotations.coco.json
    return_masks: False
    transforms:
      type: Compose
      ops: ~
  shuffle: False
  num_workers: 4
  drop_last: False
  collate_fn:
    type: BatchImageCollateFunction
