__include__: [
  '../dataset/coco_pose.yml',
  'ecpose.yml'
]


output_dir: outputs/ecpose_l


ViTAdapter:
  name: ecpose_vits
  embed_dim: 384
  num_heads: 6
  proj_dim: 256
  interaction_indexes: [10, 11]  
  weights_path: weights/ecdet_l_coco_backbone.pth

HybridEncoder:
  in_channels: [256, 256, 256]
  depth_mult: 1
  expansion: 0.75
  hidden_dim: 256
  dim_feedforward: 1024


DETRTransformer:
  hidden_dim: 256
  dim_feedforward: 1024
  num_decoder_layers: 4

eval_spatial_size: [640, 640] # h w

epoches: 74
grad_accum_steps: 2



## Optimizer
optimizer:
  type: AdamW
  params: 
    -
      params: '^(?=.*.backbone)(?!.*(?:norm|bn|bias)).*$'  
      lr: 0.0000025
    -
      params: '^(?=.*.backbone)(?=.*(?:norm|bn|bias)).*$'    
      lr: 0.0000025
      weight_decay: 0.
    - 
      params: '^(?!.*\.backbone)(?=.*(?:norm|bn|bias)).*$'
      weight_decay: 0.

  lr: 0.0005
  betas: [0.9, 0.999]
  weight_decay: 0.000125


train_dataloader: 
  dataset: 
    transforms:
      ops:
        - {type: PoseMosaic, output_size: 320, probability: 1.0}
        - {type: MixUpCopyPaste, mixup_prob: 0.5}
        - {type: RandomZoomOut, p: 0.5}
        - {type: RandomHorizontalFlip}
        - {type: ColorJitter}
        - {type: Resize, size: [640, 640]}
        - {type: ToTensor}
        - {type: Normalize, mean: [0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225]} 
      mosaic_prob: 0.5
      policy:
        epoch: [4, 48, 72]
       
  collate_fn:
    stop_epoch: 72